set -g default-command "${SHELL}"

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g set-clipboard on

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

unbind '"'
bind-key "v" split-window -v
unbind %
bind-key "h" split-window -h

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

bg="#24273a"
surface_1="#494d64"
fg="#cad3f5"
mauve="#c6a0f6"
pink="#f5c2e7"
green="#a6e3a1"
crust="#181926"

set -g status-position top
set -g status-left-length 100
set -g status-style "fg=${fg},bg=${bg}"
set -g status-left "#[fg=${mauve},bold]  #S #[fg=${fg},nobold]| "
set -g status-right "#[fg=${green},bold]%H:%M"
set -g window-status-current-format "#[fg=${pink}, bold] #I:#W"

# sessionx
set -g @sessionx-bind "o"
set -g @sessionx-fzf-builtin-tmux 'on'

# sesh
bind-key "T" display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh
