set -g default-terminal "tmux-256color"
set -ga terminal-override ",*:RGB"
set -g mouse on
set -g set-clipboard on

unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# Vim like pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind r
bind r source-file $HOME/.config/tmux/tmux.conf

# Change from 0 base to 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Vim-like copy/paste
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind-key -T copy-mode-vi MouseDragEnd1Pane

# Alt+hjkl to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt+number to select window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind -n S-Left previous-window
bind -n S-Right next-window

thm_bg="#1a1d21"
thm_bg_alt="#22262b"
thm_base0="#0f1114"
thm_base1="#171a1e"
thm_base2="#1f2228"
thm_base3="#282c34"
thm_base4="#3d424a"
thm_base5="#515761"
thm_base6="#676d77"
thm_base7="#8b919a"
thm_base8="#e0dcd4"
thm_fg="#f0efeb"
thm_fg_alt="#ccc4b4"
thm_red="#cdacac"
thm_orange="#ccc4b4"
thm_green="#b8c4b8"
thm_blue="#b4bcc4"
thm_cyan="#b4c0c8"
thm_yellow="#d4ccb4"
thm_teal="#b4c4bc"
thm_dark_cyan="#98a4ac"

# Status bar
set -g status "on"
set -g status-bg "${thm_bg}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# Messages
set -g message-style "fg=${thm_cyan},bg=${thm_base4},align=centre"
set -g message-command-style "fg=${thm_cyan},bg=${thm_base4},align=centre"

# Panes
set -g pane-border-style "fg=${thm_base4}"
set -g pane-active-border-style "fg=${thm_blue}"

# Windows
set -g window-status-activity-style "fg=${thm_fg}, bg=${thm_bg},none"
set -g window-status-separator ""
set -g window-status-style "fg=${thm_fg}, bg=${thm_bg},none"

# Statusline - current window
set -g window-status-current-format "#[fg=${thm_blue},bg=${thm_bg}] #I: #[fg=${thm_red},bg=${thm_bg}](✓) #[fg=${thm_cyan},bg=${thm_bg}]#(echo '#{pane_current_path}' | rev | cut -d'/' -f-2 | rev) #[fg=${thm_red},bg=${thm_bg}]"
